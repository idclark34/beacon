<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Outpost Companion</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- Onboarding (first run only) -->
    <div id="onboarding" class="screen">
      <div id="ob-header">
        <div class="avatar">OC</div>
        <div>
          <div class="ob-title">Outpost Companion</div>
          <div class="ob-sub">I'll watch while you build.</div>
        </div>
      </div>
      <div class="field-group">
        <label>What are you working on?</label>
        <input id="ob-name" class="field" type="text" placeholder="e.g. Outpost landing page" maxlength="80" />
      </div>
      <div class="field-group">
        <label>Repo path <span class="optional">(optional)</span></label>
        <input id="ob-path" class="field" type="text" placeholder="/Users/you/projects/outpost" maxlength="500" />
      </div>
      <button id="ob-submit" class="btn-go">Start watching →</button>
    </div>

    <!-- Popup (the main experience) -->
    <div id="popup" class="screen hidden">
      <div id="popup-drag">
        <div class="avatar small" id="popup-avatar">OC</div>
        <div id="popup-project"></div>
        <button id="popup-dismiss" title="Dismiss">×</button>
      </div>
      <div id="popup-message">
        <span id="popup-text"></span><span id="popup-cursor" class="cursor hidden"></span>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
